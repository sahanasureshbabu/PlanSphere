name: PlanSphere Comprehensive CI (Selenium, Appium, Load, Security, Vulnerability)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 – SELENIUM DESKTOP E2E TESTS (300 cases)
  # ─────────────────────────────────────────────────────────────────────────────
  selenium-tests:
    name: Selenium Desktop E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r plansphere_web_tests/requirements.txt

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Start local HTTP server
        run: |
          python -c "
          import http.server, socketserver, threading, os, time
          PORT = 8000
          DIR  = os.path.abspath('plansphere_web')
          class H(http.server.SimpleHTTPRequestHandler):
              def __init__(self, *a, **kw): super().__init__(*a, directory=DIR, **kw)
              def log_message(self, *a): pass
          socketserver.ThreadingTCPServer.allow_reuse_address = True
          httpd = socketserver.ThreadingTCPServer(('', PORT), H)
          t = threading.Thread(target=httpd.serve_forever, daemon=True)
          t.start()
          print('Server started on port', PORT)
          time.sleep(86400)
          " &
          sleep 2
          curl -sf http://localhost:8000/index.html > /dev/null && echo "Server OK"

      - name: Run Selenium Desktop Tests (300 cases)
        run: |
          python -m pytest plansphere_web_tests/test_plansphere.py \
            -v --tb=short --no-header \
            --junit-xml=selenium-junit.xml

      - name: Run Load Tests
        run: |
          python -m pytest plansphere_web_tests/test_load.py \
            -v --tb=short --no-header

      - name: Run Security Tests
        run: |
          python -m pytest plansphere_web_tests/test_security.py \
            -v --tb=short --no-header

      - name: Run Vulnerability Tests
        run: |
          python -m pytest plansphere_web_tests/test_vulnerability.py \
            -v --tb=short --no-header

      - name: Generate Selenium Excel Report
        if: always()
        run: |
          python -m pytest plansphere_web_tests/test_plansphere.py \
            plansphere_web_tests/test_load.py \
            plansphere_web_tests/test_security.py \
            plansphere_web_tests/test_vulnerability.py \
            --tb=no -q 2>/dev/null || true

      - name: Upload Selenium Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-desktop-test-report
          path: |
            selenium_test_report.xlsx
            functional_test_report.xlsx
            load_test_report.xlsx
            security_test_report.xlsx
            vulnerability_test_report.xlsx
          retention-days: 30

      - name: Upload Selenium JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-junit-results
          path: selenium-junit.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 – APPIUM MOBILE E2E TESTS (300 cases – Chrome Mobile Emulation)
  # ─────────────────────────────────────────────────────────────────────────────
  appium-tests:
    name: Appium Mobile E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r plansphere_web_tests/requirements.txt

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup Node.js for Appium
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install chromium || true

      - name: Start local HTTP server
        run: |
          python -c "
          import http.server, socketserver, threading, os, time
          PORT = 8000
          DIR  = os.path.abspath('plansphere_web')
          class H(http.server.SimpleHTTPRequestHandler):
              def __init__(self, *a, **kw): super().__init__(*a, directory=DIR, **kw)
              def log_message(self, *a): pass
          socketserver.ThreadingTCPServer.allow_reuse_address = True
          httpd = socketserver.ThreadingTCPServer(('', PORT), H)
          t = threading.Thread(target=httpd.serve_forever, daemon=True)
          t.start()
          print('Server started on port', PORT)
          time.sleep(86400)
          " &
          sleep 2
          curl -sf http://localhost:8000/index.html > /dev/null && echo "Server OK"

      - name: Start Appium Server (background)
        run: |
          appium --port 4723 &
          sleep 5
          curl -sf http://localhost:4723/status || echo "Appium not running, will use Chrome mobile emulation fallback"

      - name: Run Appium Mobile Tests (300 cases)
        run: |
          python -m pytest plansphere_web_tests/test_plansphere_appium.py \
            -v --tb=short --no-header \
            --junit-xml=appium-junit.xml

      - name: Generate Appium Excel Report
        if: always()
        run: |
          python -m pytest plansphere_web_tests/test_plansphere_appium.py \
            --tb=no -q 2>/dev/null || true

      - name: Upload Appium Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-mobile-test-report
          path: |
            appium_test_report.xlsx
            functional_test_report.xlsx
          retention-days: 30

      - name: Upload Appium JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-junit-results
          path: appium-junit.xml
          retention-days: 14
