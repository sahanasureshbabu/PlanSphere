name: PlanSphere Comprehensive CI (Selenium, Appium, Load, Security, Vulnerability)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-testing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium and Chromium Driver
      run: |
        npm install -g appium
        appium driver install chromium

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r plansphere_web_tests/requirements.txt

    - name: Run E2E Test Suite (Selenium & Appium)
      run: |
        python plansphere_web_tests/run_tests.py

    - name: Upload Excel Test Report
      if: always() # Upload report even if some tests fail
      uses: actions/upload-artifact@v4
      with:
        name: plan-sphere-e2e-test-report
        path: selenium_test_report.xlsx
        retention-days: 14
