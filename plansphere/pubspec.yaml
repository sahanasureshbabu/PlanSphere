name: plansphere
description: PlanSphere - Smart Bills, Documents & Warranty Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.19.0

  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  firebase_analytics: ^12.4.2

  google_sign_in: ^6.2.1

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.0

  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  glassmorphism: ^2.0.0

  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_document_scanner: ^0.4.1
  image_picker: ^1.0.7
  camera: ^0.12.0+1

  file_picker: ^8.1.7
  open_filex: ^4.3.4
  path_provider: ^2.1.2
  share_plus: ^10.0.2
  printing: ^5.12.0
  pdf: ^3.10.7
  syncfusion_flutter_pdfviewer: ^33.2.8

  fl_chart: ^0.69.0
  syncfusion_flutter_charts: ^33.2.8

  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  local_auth: ^3.0.1
  encrypt: ^5.0.3

  uuid: ^4.3.3
  connectivity_plus: ^6.0.5
  permission_handler: ^11.3.1
  speech_to_text: ^7.4.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.4
  package_info_plus: ^8.0.2

  image_cropper: ^8.0.2
  flutter_image_compress: ^2.2.0

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  reactive_forms: ^17.0.1
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.3.0

  iconly: ^1.0.1
  flutter_staggered_animations: ^1.1.1
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.6.4
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

dependency_overrides:
  intl: 0.20.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21