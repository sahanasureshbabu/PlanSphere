<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanSphere - Alerts Log</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .notifications-control-row {
            display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 24px;
        }
        .unread-indicator {
            width: 6px; height: 6px; background: var(--primary); border-radius: 50%; display:inline-block; margin-left: 8px;
        }
    </style>
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
    </div>

    <!-- ── CORE APPLICATION LAYOUT ── -->
    <div class="app-layout">
        
        <!-- ── SIDEBAR NAVIGATION (DESKTOP) ── -->
        <aside class="sidebar glass-container">
            <div class="sidebar-logo">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <span class="brand-name">PlanSphere</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="add-bill.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Bill
                </a>
                <a href="bills.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Bills Vault
                </a>
                <a href="vault.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    Docs Vault
                </a>
                <a href="warranties.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Warranties
                </a>
                <a href="analytics.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    Analytics
                </a>
                <a href="search.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Smart Search
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="sidebar-profile">
                    <div class="user-avatar" id="avatar-initials">A</div>
                    <div class="sidebar-profile-info">
                        <span class="name" id="user-display-name">Administrator</span>
                        <span class="email" id="user-display-email">admin@plansphere.com</span>
                    </div>
                </div>
                <a href="profile.html" class="sidebar-link" style="padding: 8px 16px;">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Settings & Profile
                </a>
                <button class="logout-btn" onclick="logout()" style="width: 100%; justify-content: flex-start; padding: 8px 16px;">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- ── MAIN PAGE CONTENT AREA ── -->
        <div class="main-content-layout">
            
            <!-- Page Header -->
            <div style="margin-bottom:28px;">
                <h1 style="font-family:'Outfit',sans-serif; font-size:24px; font-weight:800; margin-bottom:4px;">
                    System Notifications
                </h1>
                <p style="color:var(--text-secondary); font-size:13px;">Review system execution logs, backup confirmations, and warranty alerts.</p>
            </div>

            <!-- ── CONTROLS ROW ── -->
            <div class="notifications-control-row">
                <button class="btn btn-secondary" onclick="markRead()" style="width:auto; padding: 8px 16px; font-size:12px;">Mark All Read</button>
                <button class="btn btn-secondary" onclick="clearNotifs()" style="width:auto; padding: 8px 16px; font-size:12px; color:var(--danger); border-color:rgba(239,68,68,0.15);">Clear All</button>
            </div>

            <!-- ── TIMELINE CONTAINER ── -->
            <div class="timeline-list" id="timeline-container">
                <!-- Notifications loaded dynamically -->
            </div>

        </div>
    </div>

    <!-- Core Bottom Navigation (Mobile) -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-link">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a href="bills.html" class="bottom-nav-link">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Bills
        </a>
        <a href="vault.html" class="bottom-nav-link">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Vault
        </a>
        <a href="analytics.html" class="bottom-nav-link">
            <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Analytics
        </a>
    </nav>

    <!-- Core Javascript Scripts -->
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = checkAuth();
            if (!session) return;

            document.getElementById('user-display-name').textContent = session.name;
            document.getElementById('user-display-email').textContent = session.email;
            document.getElementById('avatar-initials').textContent = (session.name || 'A').charAt(0).toUpperCase();

            // Render list
            renderNotificationsTimeline();
        });

        function renderNotificationsTimeline() {
            const container = document.getElementById('timeline-container');
            const notifs = getNotifications();

            if (notifs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:60px 0;">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        </div>
                        <h3>No Notifications</h3>
                        <p>Your timeline logs are clean. You have no pending warnings.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = notifs.map(n => {
                const dateStr = formatDateTime(n.timestamp);
                
                // Icon select
                let icon = `<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
                let cls  = '';
                
                if (n.title.includes('Expiry') || n.title.includes('Notice') || n.title.includes('Alert')) {
                    icon = `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
                    cls = 'warning';
                } else if (n.title.includes('Removed') || n.title.includes('Delete')) {
                    icon = `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/></svg>`;
                    cls = 'danger';
                }

                const dot = !n.read ? `<span class="unread-indicator" title="Unread"></span>` : '';

                return `
                    <div class="glass-container timeline-card">
                        <div class="timeline-icon ${cls}">
                            ${icon}
                        </div>
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <h4>${n.title}${dot}</h4>
                                <span>${dateStr}</span>
                            </div>
                            <p>${n.message}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDateTime(isoStr) {
            const date = new Date(isoStr);
            return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) + ' ' + 
                   date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function markRead() {
            markAllNotificationsRead();
            showToast('All notifications marked as read.', 'success');
            renderNotificationsTimeline();
        }

        function clearNotifs() {
            clearAllNotifications();
            showToast('Cleared notifications timeline.', 'success');
            renderNotificationsTimeline();
        }
    </script>
</body>
</html>
